<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pausa de Calma</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}
.container{
    background:rgba(0,0,0,0.3);
    padding:30px;
    border-radius:25px;
    backdrop-filter: blur(15px);
    width:90%;
    max-width:600px;
}
button{
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:white;
    color:#1e3c72;
    margin:5px;
    cursor:pointer;
}
select, textarea{
    padding:8px;
    border-radius:10px;
    border:none;
    margin-top:10px;
    width:90%;
}
canvas{
    margin-top:20px;
    background:white;
    border-radius:15px;
}
</style>
</head>
<body>

<div class="container">

<h2>Registro emocional lunar</h2>

<select id="emocion">
<option value="😊 Feliz">😊 Feliz</option>
<option value="😌 Tranquilo">😌 Tranquilo</option>
<option value="😔 Triste">😔 Triste</option>
<option value="😟 Ansioso">😟 Ansioso</option>
<option value="😤 Enojado">😤 Enojado</option>
<option value="😴 Cansado">😴 Cansado</option>
<option value="🙏 Agradecido">🙏 Agradecido</option>
<option value="💪 Fuerte">💪 Fuerte</option>
</select>

<textarea id="nota" placeholder="Nota opcional..."></textarea>

<br>
<button onclick="guardarEmocion()">Guardar emoción</button>
<button onclick="borrarHistorial()">Borrar historial</button>

<div id="historial"></div>

<h3>Índice estadístico lunar (r)</h3>
<div id="indiceEstadistico"></div>

<h3>Predicción emocional según fase actual</h3>
<div id="prediccion"></div>

<canvas id="graficoLunar"></canvas>

</div>

<script>
let graficoLunar;

/* ===== FASE LUNAR ===== */

function calcularFaseLunar(fecha = new Date()) {
    const lp = 2551443;
    const now = fecha.getTime() / 1000;
    const new_moon = new Date('2001-01-24T13:00:00Z').getTime() / 1000;
    const phase = ((now - new_moon) % lp) / lp;

    if (phase < 0.03 || phase > 0.97) return "🌑 Luna Nueva";
    if (phase < 0.22) return "🌒 Luna Creciente";
    if (phase < 0.28) return "🌓 Cuarto Creciente";
    if (phase < 0.47) return "🌔 Gibosa Creciente";
    if (phase < 0.53) return "🌕 Luna Llena";
    if (phase < 0.72) return "🌖 Gibosa Menguante";
    if (phase < 0.78) return "🌗 Cuarto Menguante";
    return "🌘 Luna Menguante";
}

const faseNumerica = {
"🌑 Luna Nueva":0,
"🌒 Luna Creciente":1,
"🌓 Cuarto Creciente":2,
"🌔 Gibosa Creciente":3,
"🌕 Luna Llena":4,
"🌖 Gibosa Menguante":5,
"🌗 Cuarto Menguante":6,
"🌘 Luna Menguante":7
};

const valorEmocion = {
"😊 Feliz":1,
"😌 Tranquilo":0.7,
"🙏 Agradecido":0.8,
"💪 Fuerte":0.9,
"😴 Cansado":-0.2,
"😔 Triste":-0.8,
"😟 Ansioso":-1,
"😤 Enojado":-0.9
};

/* ===== REGISTRO ===== */

function guardarEmocion(){
    let emocion=document.getElementById("emocion").value;
    let nota=document.getElementById("nota").value;
    let fase=calcularFaseLunar();

    let registro={emocion,nota,fase};

    let historial=JSON.parse(localStorage.getItem("registroEmocional"))||[];
    historial.push(registro);
    localStorage.setItem("registroEmocional",JSON.stringify(historial));

    document.getElementById("nota").value="";
    mostrarHistorial();
    analizarDatos();
}

function borrarHistorial(){
    localStorage.removeItem("registroEmocional");
    mostrarHistorial();
    analizarDatos();
}

function mostrarHistorial(){
    let historial=JSON.parse(localStorage.getItem("registroEmocional"))||[];
    let cont=document.getElementById("historial");
    cont.innerHTML="";
    historial.slice().reverse().forEach(r=>{
        cont.innerHTML+=`<div>${r.emocion} - ${r.fase}<hr></div>`;
    });
}

/* ===== CORRELACIÓN REAL ===== */

function analizarDatos(){
    let historial=JSON.parse(localStorage.getItem("registroEmocional"))||[];
    if(historial.length<5){
        document.getElementById("indiceEstadistico").innerHTML="Se necesitan más datos (mínimo 5 registros).";
        return;
    }

    let x=[], y=[];

    historial.forEach(r=>{
        x.push(faseNumerica[r.fase]);
        y.push(valorEmocion[r.emocion]);
    });

    let r = correlacionPearson(x,y);

    interpretarCorrelacion(r);
    generarGrafico(x,y);
    predecirEmocion(r);
}

function correlacionPearson(x,y){
    let n=x.length;
    let sumX=0,sumY=0,sumXY=0,sumX2=0,sumY2=0;

    for(let i=0;i<n;i++){
        sumX+=x[i];
        sumY+=y[i];
        sumXY+=x[i]*y[i];
        sumX2+=x[i]*x[i];
        sumY2+=y[i]*y[i];
    }

    return (n*sumXY - sumX*sumY) /
           Math.sqrt((n*sumX2 - sumX*sumX) * (n*sumY2 - sumY*sumY));
}

function interpretarCorrelacion(r){
    let fuerza="";
    let abs=Math.abs(r);

    if(abs<0.2) fuerza="Correlación muy débil o inexistente";
    else if(abs<0.4) fuerza="Correlación débil";
    else if(abs<0.6) fuerza="Correlación moderada";
    else if(abs<0.8) fuerza="Correlación fuerte";
    else fuerza="Correlación muy fuerte";

    document.getElementById("indiceEstadistico").innerHTML=
        `r = ${r.toFixed(3)} → ${fuerza}`;
}

/* ===== PREDICCIÓN ===== */

function predecirEmocion(r){
    let faseActual=calcularFaseLunar();
    let valorFase=faseNumerica[faseActual];

    let tendencia=r>0 ? "más positiva" : "más introspectiva o sensible";

    document.getElementById("prediccion").innerHTML=
        `Según tu historial y la fase actual (${faseActual}), `+
        `la tendencia emocional podría ser ${tendencia}.`;
}

/* ===== GRÁFICO DISPERSIÓN ===== */

function generarGrafico(x,y){
    let ctx=document.getElementById("graficoLunar").getContext("2d");
    if(graficoLunar)graficoLunar.destroy();

    let puntos=x.map((val,i)=>({x:val,y:y[i]}));

    graficoLunar=new Chart(ctx,{
        type:"scatter",
        data:{
            datasets:[{
                label:"Fase lunar vs Estado emocional",
                data:puntos
            }]
        },
        options:{
            scales:{
                x:{title:{display:true,text:"Fase Lunar (0-7)"}},
                y:{title:{display:true,text:"Estado Emocional (-1 a +1)"}}
            }
        }
    });
}

/* ===== INIT ===== */

mostrarHistorial();
analizarDatos();

</script>

</body>
</html>
