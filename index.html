<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pausa de Calma</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="1024x1024" href="icon-1024.png">
<meta name="theme-color" content="#1e3c72">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

.container{
    background:rgba(0,0,0,0.3);
    padding:30px;
    border-radius:25px;
    backdrop-filter: blur(15px);
    width:90%;
    max-width:520px;
}

.circle{
    width:150px;
    height:150px;
    border-radius:50%;
    background:rgba(255,255,255,0.4);
    margin:20px auto;
    transition:transform 4s ease-in-out;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:white;
    color:#1e3c72;
    font-size:16px;
    margin:5px;
    cursor:pointer;
}

select, textarea{
    padding:8px;
    border-radius:10px;
    border:none;
    margin-top:10px;
    width:90%;
}

textarea{
    resize:none;
    height:60px;
}

.frase{
    margin-top:15px;
    font-style:italic;
    min-height:40px;
}

.historial{
    margin-top:15px;
    font-size:14px;
    max-height:120px;
    overflow:auto;
    text-align:left;
}

canvas{
    margin-top:20px;
    background:white;
    border-radius:15px;
}
</style>
</head>
<body>

<div class="container">

<h2>Respira</h2>
<div class="circle" id="circle"></div>
<p id="instruccion">Presiona iniciar</p>

<button onclick="iniciar()">Iniciar</button>
<button onclick="detener()">Detener</button>

<br>
<label>Duración:</label>
<select id="duracion">
    <option value="300000">5 minutos</option>
    <option value="600000">10 minutos</option>
    <option value="900000">15 minutos</option>
</select>

<div class="frase" id="frase"></div>

<br>
<button onclick="toggleSonido()">🌧 Lluvia</button>

<h3>Registro emocional diario</h3>

<select id="emocion">
<option value="😊 Feliz">😊 Feliz</option>
<option value="😌 Tranquilo">😌 Tranquilo</option>
<option value="😔 Triste">😔 Triste</option>
<option value="😟 Ansioso">😟 Ansioso</option>
<option value="😤 Enojado">😤 Enojado</option>
<option value="😴 Cansado">😴 Cansado</option>
<option value="🙏 Agradecido">🙏 Agradecido</option>
<option value="💪 Fuerte">💪 Fuerte</option>
</select>

<textarea id="nota" placeholder="Nota opcional..."></textarea>

<button onclick="guardarEmocion()">Guardar emoción</button>
<button onclick="borrarHistorial()">Borrar historial</button>

<div class="historial" id="historial"></div>

<h3>Resumen emocional</h3>
<div id="resumenEmocional"></div>

<h3>Reflexión inteligente</h3>
<div id="mensajeInteligente"></div>

<h3>Alerta emocional</h3>
<div id="alertaEstres" style="font-weight:bold;"></div>

<h3>Fase lunar actual</h3>
<div id="faseLunar"></div>
<div id="mensajeLunar" style="font-style:italic;"></div>

<h3>Filtro</h3>
<select id="filtroTiempo" onchange="actualizarAnalisis()">
<option value="todos">Todo el historial</option>
<option value="semana">Últimos 7 días</option>
</select>

<canvas id="graficoEmociones"></canvas>

</div>

<audio id="lluvia" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

let circle = document.getElementById("circle");
let instruccion = document.getElementById("instruccion");
let frase = document.getElementById("frase");
let lluvia = document.getElementById("lluvia");
let grafico;

let timeoutSosten, timeoutExhala, timeoutLoop, temporizadorSesion;

let frases=[
"Estás en un nuevo comienzo.","Respira… aquí estás seguro.","Un día a la vez.",
"No tienes que resolver todo hoy.","La calma también es fuerza.",
"Confía en tu proceso","Respira y avanza","Todo estará bien",
"Suelta lo que pesa","Hoy es un buen día","Un paso a la vez",
"Permítete descansar","Encuentra tu calma","Todo tiene su momento"
];

function iniciar(){
    detener();
    ciclo();
    let tiempo=parseInt(document.getElementById("duracion").value);
    temporizadorSesion=setTimeout(()=>{detener();alert("Sesión completada 🌿");},tiempo);
}

function detener(){
    clearTimeout(timeoutSosten);
    clearTimeout(timeoutExhala);
    clearTimeout(timeoutLoop);
    clearTimeout(temporizadorSesion);
    instruccion.innerText="Pausa finalizada";
    circle.style.transform="scale(1)";
}

function ciclo(){
    instruccion.innerText="Inhala";
    circle.style.transform="scale(1.5)";

    timeoutSosten=setTimeout(()=>{instruccion.innerText="Sostén";},4000);

    timeoutExhala=setTimeout(()=>{
        instruccion.innerText="Exhala";
        circle.style.transform="scale(1)";
    },8000);

    timeoutLoop=setTimeout(()=>{
        frase.innerText=frases[Math.floor(Math.random()*frases.length)];
        ciclo();
    },14000);
}

function toggleSonido(){
    lluvia.paused?lluvia.play():lluvia.pause();
}

/* ===== REGISTRO ===== */

function guardarEmocion(){
    let emocion=document.getElementById("emocion").value;
    let nota=document.getElementById("nota").value;
    let fecha=new Date().toLocaleDateString();
    let hora=new Date().toLocaleTimeString();
    let registro={fecha,hora,emocion,nota};

    let historial=JSON.parse(localStorage.getItem("registroEmocional"))||[];
    historial.push(registro);
    localStorage.setItem("registroEmocional",JSON.stringify(historial));

    document.getElementById("nota").value="";
    mostrarHistorial();
    mostrarResumenEmocional();
    actualizarAnalisis();
}

function borrarHistorial(){
    localStorage.removeItem("registroEmocional");
    mostrarHistorial();
    mostrarResumenEmocional();
    actualizarAnalisis();
}

function mostrarHistorial(){
    let historial=JSON.parse(localStorage.getItem("registroEmocional"))||[];
    let cont=document.getElementById("historial");
    cont.innerHTML="";
    historial.slice().reverse().forEach(r=>{
        cont.innerHTML+=`<div><strong>${r.fecha} ${r.hora}</strong><br>${r.emocion}<br><small>${r.nota}</small><hr></div>`;
    });
}

function mostrarResumenEmocional(){
    let historial=JSON.parse(localStorage.getItem("registroEmocional"))||[];
    let resumen={},cont=document.getElementById("resumenEmocional");
    cont.innerHTML="";
    historial.forEach(r=>{resumen[r.emocion]=(resumen[r.emocion]||0)+1;});
    for(let e in resumen){cont.innerHTML+=`${e}: <strong>${resumen[e]}</strong><br>`;}
}

/* ===== ANALÍTICA ===== */

function actualizarAnalisis(){
    let historial=JSON.parse(localStorage.getItem("registroEmocional"))||[];
    analizarEmociones(historial);
}

function analizarEmociones(historial){

    let mensaje=document.getElementById("mensajeInteligente");
    mensaje.innerHTML="";
    document.getElementById("alertaEstres").innerHTML="";

    if(historial.length===0){
        mensaje.innerHTML="No hay datos.";
        if(grafico)grafico.destroy();
        return;
    }

    let resumen={};
    historial.forEach(r=>{resumen[r.emocion]=(resumen[r.emocion]||0)+1;});
    let dominante=Object.keys(resumen).reduce((a,b)=>resumen[a]>resumen[b]?a:b);

    if(dominante.includes("Ansioso")||dominante.includes("Triste")||dominante.includes("Enojado"))
        mensaje.innerHTML="Has estado experimentando emociones desafiantes. Considera más pausas conscientes.";
    else if(dominante.includes("Feliz")||dominante.includes("Agradecido")||dominante.includes("Fuerte"))
        mensaje.innerHTML="Tu tendencia emocional es positiva. Sigue cultivando estos hábitos.";
    else
        mensaje.innerHTML="Tu estado emocional muestra equilibrio.";

    generarGrafico(resumen);
    analizarPatronEmocional(historial);
}

function generarGrafico(resumen){
    let ctx=document.getElementById("graficoEmociones").getContext("2d");
    if(grafico)grafico.destroy();
    grafico=new Chart(ctx,{type:"doughnut",data:{labels:Object.keys(resumen),datasets:[{data:Object.values(resumen)}]}});
}

function analizarPatronEmocional(historial){
    let ultimos=historial.slice(-7);
    let negativas=ultimos.filter(r=>r.emocion.includes("Ansioso")||r.emocion.includes("Triste")||r.emocion.includes("Enojado")).length;
    if(negativas>=4)
        document.getElementById("alertaEstres").innerHTML="🚨 Estrés recurrente detectado. Considera descanso profundo.";
}

/* ===== FASE LUNAR ===== */

function calcularFaseLunar(fecha = new Date()) {
    const lp = 2551443;
    const now = fecha.getTime() / 1000;
    const new_moon = new Date('2001-01-24T13:00:00Z').getTime() / 1000;
    const phase = ((now - new_moon) % lp) / lp;

    if (phase < 0.03 || phase > 0.97) return "🌑 Luna Nueva";
    if (phase < 0.22) return "🌒 Luna Creciente";
    if (phase < 0.28) return "🌓 Cuarto Creciente";
    if (phase < 0.47) return "🌔 Gibosa Creciente";
    if (phase < 0.53) return "🌕 Luna Llena";
    if (phase < 0.72) return "🌖 Gibosa Menguante";
    if (phase < 0.78) return "🌗 Cuarto Menguante";
    return "🌘 Luna Menguante";
}

function mostrarFaseLunar(){
    const fase = calcularFaseLunar();
    document.getElementById("faseLunar").innerHTML = `<strong>${fase}</strong>`;
    analizarInfluenciaLunar(fase);
}

function analizarInfluenciaLunar(fase){
    let historial = JSON.parse(localStorage.getItem("registroEmocional")) || [];
    let mensaje = document.getElementById("mensajeLunar");

    if(historial.length === 0){
        mensaje.innerHTML = "Registra emociones para analizar posible influencia lunar.";
        return;
    }

    let ultimas = historial.slice(-5);
    let negativas = ultimas.filter(r => 
        r.emocion.includes("Ansioso") ||
        r.emocion.includes("Triste") ||
        r.emocion.includes("Enojado")
    ).length;

    if(fase.includes("Luna Llena") && negativas >= 3){
        mensaje.innerHTML = "La Luna Llena puede intensificar emociones. Practica más respiración consciente.";
    }
    else if(fase.includes("Luna Nueva")){
        mensaje.innerHTML = "La Luna Nueva es ideal para nuevos comienzos emocionales.";
    }
    else{
        mensaje.innerHTML = "Observa si notas cambios emocionales según la fase lunar.";
    }
}

mostrarHistorial();
mostrarResumenEmocional();
actualizarAnalisis();
mostrarFaseLunar();
</script>

</body>
</html>
