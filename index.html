<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pausa de Calma</title>

<link rel="apple-touch-icon" href="icon-1024.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pausa de Calma">
<meta name="theme-color" content="#1e3c72">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}
.container{
    background:rgba(0,0,0,0.35);
    padding:30px;
    border-radius:25px;
    backdrop-filter:blur(15px);
    width:90%;
    max-width:650px;
}
.circle{
    width:150px;
    height:150px;
    border-radius:50%;
    background:rgba(255,255,255,0.4);
    margin:20px auto;
    transition:transform 4s ease-in-out;
}
button{
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:white;
    color:#1e3c72;
    margin:5px;
    cursor:pointer;
}
select,textarea{
    padding:8px;
    border-radius:10px;
    border:none;
    margin-top:10px;
    width:90%;
}
canvas{
    margin-top:20px;
    background:white;
    border-radius:15px;
}
.historial{
    max-height:120px;
    overflow:auto;
    text-align:left;
    font-size:14px;
}
</style>
</head>
<body>

<div class="container">

<h2>🧘 Respiración Consciente</h2>
<div class="circle" id="circle"></div>
<p id="instruccion">Presiona iniciar</p>

<button onclick="iniciar()">Iniciar</button>
<button onclick="detener()">Detener</button>
<button onclick="toggleSonido()">🌧 Lluvia</button>

<select id="duracion">
<option value="300000">5 min</option>
<option value="600000">10 min</option>
<option value="900000">15 min</option>
</select>

<hr>

<h2>🌙 Registro Emocional Lunar</h2>

<select id="emocion">
<option value="😊 Feliz">😊 Feliz</option>
<option value="😌 Tranquilo">😌 Tranquilo</option>
<option value="😔 Triste">😔 Triste</option>
<option value="😟 Ansioso">😟 Ansioso</option>
<option value="😤 Enojado">😤 Enojado</option>
<option value="😴 Cansado">😴 Cansado</option>
<option value="🙏 Agradecido">🙏 Agradecido</option>
<option value="💪 Fuerte">💪 Fuerte</option>
</select>

<textarea id="nota" placeholder="Nota opcional"></textarea>

<br>
<button onclick="guardarEmocion()">Guardar emoción</button>
<button onclick="borrarHistorial()">Borrar historial</button>

<div class="historial" id="historial"></div>

<h3>🌙 Fase lunar actual</h3>
<div id="faseActual"></div>

<h3>🔬 Índice estadístico lunar</h3>
<div id="indice"></div>

<h3>🔮 Predicción emocional</h3>
<div id="prediccion"></div>

<canvas id="graficoGeneral"></canvas>
<canvas id="graficoDispersion"></canvas>

</div>

<audio id="lluvia" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>

/* RESPIRACIÓN */

let circle=document.getElementById("circle");
let instruccion=document.getElementById("instruccion");
let lluvia=document.getElementById("lluvia");
let timeout1,timeout2,timeout3,temporizador;

function iniciar(){
    detener();
    ciclo();
    let tiempo=parseInt(document.getElementById("duracion").value);
    temporizador=setTimeout(()=>{detener();alert("Sesión completada 🌿");},tiempo);
}
function detener(){
    clearTimeout(timeout1);
    clearTimeout(timeout2);
    clearTimeout(timeout3);
    clearTimeout(temporizador);
    circle.style.transform="scale(1)";
    instruccion.innerText="Pausa finalizada";
}
function ciclo(){
    instruccion.innerText="Inhala";
    circle.style.transform="scale(1.5)";
    timeout1=setTimeout(()=>{instruccion.innerText="Sostén";},4000);
    timeout2=setTimeout(()=>{
        instruccion.innerText="Exhala";
        circle.style.transform="scale(1)";
    },8000);
    timeout3=setTimeout(ciclo,14000);
}
function toggleSonido(){
    lluvia.paused?lluvia.play():lluvia.pause();
}

/* FASE LUNAR */

function calcularFaseLunar(fecha=new Date()){
    const lp=2551443;
    const now=fecha.getTime()/1000;
    const new_moon=new Date('2001-01-24T13:00:00Z').getTime()/1000;
    const phase=((now-new_moon)%lp)/lp;

    if(phase<0.03||phase>0.97)return "🌑 Luna Nueva";
    if(phase<0.22)return "🌒 Luna Creciente";
    if(phase<0.28)return "🌓 Cuarto Creciente";
    if(phase<0.47)return "🌔 Gibosa Creciente";
    if(phase<0.53)return "🌕 Luna Llena";
    if(phase<0.72)return "🌖 Gibosa Menguante";
    if(phase<0.78)return "🌗 Cuarto Menguante";
    return "🌘 Luna Menguante";
}

const faseNum={"🌑 Luna Nueva":0,"🌒 Luna Creciente":1,"🌓 Cuarto Creciente":2,"🌔 Gibosa Creciente":3,"🌕 Luna Llena":4,"🌖 Gibosa Menguante":5,"🌗 Cuarto Menguante":6,"🌘 Luna Menguante":7};
const valorEmocion={"😊 Feliz":1,"😌 Tranquilo":0.7,"🙏 Agradecido":0.8,"💪 Fuerte":0.9,"😴 Cansado":-0.2,"😔 Triste":-0.8,"😟 Ansioso":-1,"😤 Enojado":-0.9};

/* REGISTRO */

function guardarEmocion(){
    let emocion=document.getElementById("emocion").value;
    let fase=calcularFaseLunar();
    let historial=JSON.parse(localStorage.getItem("registro"))||[];
    historial.push({emocion,fase});
    localStorage.setItem("registro",JSON.stringify(historial));
    mostrarHistorial();
    analizar();
}
function borrarHistorial(){
    localStorage.removeItem("registro");
    mostrarHistorial();
    analizar();
}
function mostrarHistorial(){
    let historial=JSON.parse(localStorage.getItem("registro"))||[];
    let cont=document.getElementById("historial");
    cont.innerHTML="";
    historial.slice().reverse().forEach(r=>{
        cont.innerHTML+=`${r.emocion} - ${r.fase}<hr>`;
    });
}

/* ANALÍTICA */

function analizar(){
    let historial=JSON.parse(localStorage.getItem("registro"))||[];
    document.getElementById("faseActual").innerHTML=calcularFaseLunar();

    if(historial.length<5){
        document.getElementById("indice").innerHTML="Mínimo 5 registros.";
        return;
    }

    let x=[],y=[];
    historial.forEach(r=>{
        x.push(faseNum[r.fase]);
        y.push(valorEmocion[r.emocion]);
    });

    let r=pearson(x,y);
    document.getElementById("indice").innerHTML=`r = ${r.toFixed(3)}`;

    let predBase = `Tendencia ${r>0?"positiva":"introspectiva"}`;
    let predAvanzada = prediccionAvanzada(historial);

    document.getElementById("prediccion").innerHTML = `
    ${predBase}<br><br>
    ${predAvanzada}
    `;
}

function pearson(x,y){
    let n=x.length,sumX=0,sumY=0,sumXY=0,sumX2=0,sumY2=0;
    for(let i=0;i<n;i++){
        sumX+=x[i];sumY+=y[i];
        sumXY+=x[i]*y[i];
        sumX2+=x[i]*x[i];
        sumY2+=y[i]*y[i];
    }
    return (n*sumXY-sumX*sumY)/Math.sqrt((n*sumX2-sumX*sumX)*(n*sumY2-sumY*sumY));
}

/* NUEVA IA LOCAL (OFFLINE) */

function prediccionAvanzada(historial){
    let mapaFases={};

    historial.forEach(r=>{
        if(!mapaFases[r.fase]) mapaFases[r.fase]=[];
        mapaFases[r.fase].push(valorEmocion[r.emocion]);
    });

    let promedios={};
    for(let f in mapaFases){
        let arr=mapaFases[f];
        promedios[f]=arr.reduce((a,b)=>a+b,0)/arr.length;
    }

    let faseActual=calcularFaseLunar();
    let valorPredicho=promedios[faseActual];

    if(valorPredicho===undefined){
        return "Aún no hay suficientes datos para esta fase.";
    }

    let estado="";
    if(valorPredicho>0.5) estado="Alta energía positiva ✨";
    else if(valorPredicho>0) estado="Estado equilibrado 🙂";
    else if(valorPredicho>-0.5) estado="Tendencia introspectiva 🌙";
    else estado="Momento emocional sensible 💭";

    let recomendacion = valorPredicho<0 
        ? "💡 Recomendación: descanso, reflexión o meditación."
        : "💡 Recomendación: aprovecha para actuar y avanzar.";

    let total=historial.length;
    let confianza= total>20 ? "Alta" : total>10 ? "Media" : "Baja";

    return `
    ${estado}<br>
    🔎 Fase actual: ${faseActual}<br>
    📊 Valor estimado: ${valorPredicho.toFixed(2)}<br>
    📈 Confianza: ${confianza}<br>
    ${recomendacion}
    `;
}

mostrarHistorial();
analizar();

</script>
</body>
</html>
