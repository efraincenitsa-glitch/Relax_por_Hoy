<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pausa de Calma</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="1024x1024" href="icon-1024.png">
<meta name="theme-color" content="#1e3c72">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

.container{
    background:rgba(0,0,0,0.3);
    padding:40px;
    border-radius:25px;
    backdrop-filter: blur(15px);
    width:85%;
    max-width:500px;
}

.circle{
    width:150px;
    height:150px;
    border-radius:50%;
    background:rgba(255,255,255,0.4);
    margin:30px auto;
    transition:transform 4s ease-in-out;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:white;
    color:#1e3c72;
    font-size:18px;
    margin:5px;
}

select, textarea{
    padding:8px;
    border-radius:10px;
    border:none;
    margin-top:10px;
    width:90%;
}

textarea{
    resize:none;
    height:60px;
}

.frase{
    margin-top:20px;
    font-style:italic;
    min-height:40px;
}

.historial{
    margin-top:15px;
    font-size:14px;
    max-height:120px;
    overflow:auto;
    text-align:left;
}

canvas{
    margin-top:20px;
    background:white;
    border-radius:15px;
}
</style>
</head>
<body>

<div class="container">
    <h2>Respira</h2>
    <div class="circle" id="circle"></div>
    <p id="instruccion">Presiona iniciar</p>

    <button onclick="iniciar()">Iniciar</button>
    <button onclick="detener()">Detener</button>

    <br>
    <label>Duración:</label>
    <select id="duracion">
        <option value="300000">5 minutos</option>
        <option value="600000">10 minutos</option>
        <option value="900000">15 minutos</option>
    </select>

    <div class="frase" id="frase"></div>

    <br><br>
    <button onclick="toggleSonido()">🌧 Lluvia</button>

    <h3>Registro emocional diario</h3>

    <select id="emocion">
        <option value="😊 Feliz">😊 Feliz</option>
        <option value="😌 Tranquilo">😌 Tranquilo</option>
        <option value="😔 Triste">😔 Triste</option>
        <option value="😟 Ansioso">😟 Ansioso</option>
        <option value="😤 Enojado">😤 Enojado</option>
        <option value="😴 Cansado">😴 Cansado</option>
        <option value="🙏 Agradecido">🙏 Agradecido</option>
        <option value="💪 Fuerte">💪 Fuerte</option>
    </select>

    <textarea id="nota" placeholder="Nota opcional..."></textarea>

    <button onclick="guardarEmocion()">Guardar emoción</button>
    <button onclick="borrarHistorial()">Borrar historial</button>

    <div class="historial" id="historial"></div>

    <h3>Resumen emocional</h3>
    <div id="resumenEmocional" style="font-size:14px; text-align:left;"></div>

    <h3>Reflexión inteligente</h3>
    <div id="mensajeInteligente"></div>

    <h3>Alerta emocional</h3>
    <div id="alertaEstres" style="font-weight:bold;"></div>

    <h3>Filtro</h3>
    <select id="filtroTiempo" onchange="actualizarAnalisis()">
        <option value="todos">Todo el historial</option>
        <option value="semana">Últimos 7 días</option>
    </select>

    <canvas id="graficoEmociones"></canvas>

</div>

<audio id="lluvia" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

let circle = document.getElementById("circle");
let instruccion = document.getElementById("instruccion");
let frase = document.getElementById("frase");
let lluvia = document.getElementById("lluvia");
let grafico;

/* ================= RESPIRACIÓN ================= */

let intervalo;
let temporizador;

let frases = [
"Estás en un nuevo comienzo.","Respira… aquí estás seguro.","Un día a la vez.",
"No tienes que resolver todo hoy.","La calma también es fuerza.",
"Estás en un nuevo comienzo","Confía en tu proceso","Respira y avanza",
"Todo estará bien","Suelta lo que pesa","Hoy es un buen día",
"Un paso a la vez","Permítete descansar","Encuentra tu calma",
"Todo tiene su momento","Eres más fuerte de lo que crees",
"Abraza el presente","La paz está en ti","Haz espacio para lo nuevo",
"Tu energía es valiosa","Fluye sin miedo","Escucha a tu corazón",
"Permite que la luz entre","Cada día cuenta","Vas por buen camino",
"Confía en tu intuición","Respira profundo","Es tiempo de renacer",
"Hoy eliges estar bien","Avanza con serenidad","Todo empieza contigo",
"Encuentra belleza en lo simple","Permanece en armonía","Eres suficiente",
"La calma te pertenece","Hoy eliges paz","Cada respiro es una oportunidad",
"Libérate del miedo","El cambio es crecimiento","Vive con intención",
"Escoge tu paz","La claridad llega","Deja que todo fluya",
"El universo te acompaña","Tu alma sabe el camino","Cree en tu luz",
"Regálate un descanso","Permite que la vida te sorprenda",
"El silencio también habla","Tu bienestar es prioridad",
"Hazlo con amor","Estás donde debes estar",
"Brilla sin dudar","Camina con confianza","Hoy es un nuevo inicio"
];

function iniciar(){
    ciclo();
    let tiempo = document.getElementById("duracion").value;
    temporizador = setTimeout(()=>{ detener(); alert("Sesión completada 🌿"); }, tiempo);
}

function detener(){
    clearTimeout(temporizador);
    clearTimeout(intervalo);
    instruccion.innerText="Pausa finalizada";
    circle.style.transform="scale(1)";
}

function ciclo(){
    instruccion.innerText="Inhala";
    circle.style.transform="scale(1.5)";
    intervalo=setTimeout(()=>{instruccion.innerText="Sostén";},4000);
    intervalo=setTimeout(()=>{instruccion.innerText="Exhala";circle.style.transform="scale(1)";},8000);
    intervalo=setTimeout(()=>{frase.innerText=frases[Math.floor(Math.random()*frases.length)];ciclo();},14000);
}

function toggleSonido(){ lluvia.paused?lluvia.play():lluvia.pause(); }

/* ================= REGISTRO ================= */

function guardarEmocion(){
    let emocion=document.getElementById("emocion").value;
    let nota=document.getElementById("nota").value;
    let fecha=new Date().toLocaleDateString();
    let hora=new Date().toLocaleTimeString();
    let registro={fecha,hora,emocion,nota};

    let historial=JSON.parse(localStorage.getItem("registroEmocional"))||[];
    historial.push(registro);
    localStorage.setItem("registroEmocional",JSON.stringify(historial));

    document.getElementById("nota").value="";
    mostrarHistorial();
    mostrarResumenEmocional();
    actualizarAnalisis();
}

function borrarHistorial(){
    localStorage.removeItem("registroEmocional");
    mostrarHistorial();
    mostrarResumenEmocional();
    actualizarAnalisis();
}

function mostrarHistorial(){
    let historial=JSON.parse(localStorage.getItem("registroEmocional"))||[];
    let contenedor=document.getElementById("historial");
    contenedor.innerHTML="";
    historial.slice().reverse().forEach(r=>{
        contenedor.innerHTML+=`<div><strong>${r.fecha} ${r.hora}</strong><br>${r.emocion}<br><small>${r.nota}</small><hr></div>`;
    });
}

function mostrarResumenEmocional(){
    let historial=JSON.parse(localStorage.getItem("registroEmocional"))||[];
    let resumen={},contenedor=document.getElementById("resumenEmocional");
    contenedor.innerHTML="";
    historial.forEach(r=>{resumen[r.emocion]=(resumen[r.emocion]||0)+1;});
    for(let e in resumen){contenedor.innerHTML+=`${e}: <strong>${resumen[e]}</strong><br>`;}
}

/* ================= ANALÍTICA AVANZADA ================= */

function actualizarAnalisis(){
    let historial=JSON.parse(localStorage.getItem("registroEmocional"))||[];
    let filtro=document.getElementById("filtroTiempo").value;

    if(filtro==="semana"){
        let hoy=new Date();
        historial=historial.filter(r=>{
            let p=r.fecha.split("/");
            let f=new Date(p[2],p[1]-1,p[0]);
            return (hoy-f)/(1000*60*60*24)<=7;
        });
    }
    analizarEmociones(historial);
}

function analizarEmociones(historial){
    if(historial.length===0){document.getElementById("mensajeInteligente").innerHTML="No hay datos.";return;}
    let resumen={};
    historial.forEach(r=>{resumen[r.emocion]=(resumen[r.emocion]||0)+1;});
    let dominante=Object.keys(resumen).reduce((a,b)=>resumen[a]>resumen[b]?a:b);
    generarMensaje(dominante);
    generarGrafico(resumen);
    analizarPatronEmocional(historial);
}

function generarMensaje(e){
    let m="";
    if(e.includes("Ansioso")||e.includes("Triste")||e.includes("Enojado"))
        m="Has estado experimentando emociones desafiantes. Considera más pausas conscientes.";
    else if(e.includes("Feliz")||e.includes("Agradecido")||e.includes("Fuerte"))
        m="Tu tendencia emocional es positiva. Sigue cultivando estos hábitos.";
    else
        m="Tu estado emocional muestra equilibrio.";
    document.getElementById("mensajeInteligente").innerHTML=m;
}

function generarGrafico(resumen){
    let ctx=document.getElementById("graficoEmociones").getContext("2d");
    if(grafico)grafico.destroy();
    grafico=new Chart(ctx,{type:"doughnut",data:{labels:Object.keys(resumen),datasets:[{data:Object.values(resumen)}]}});
}

/* ===== ALERTA Y PATRÓN ===== */

function analizarPatronEmocional(historial){
    let ultimos=historial.slice(-7);
    let negativas=ultimos.filter(r=>r.emocion.includes("Ansioso")||r.emocion.includes("Triste")||r.emocion.includes("Enojado")).length;

    if(negativas>=4)
        document.getElementById("alertaEstres").innerHTML="🚨 Estrés recurrente detectado. Considera apoyo o descanso profundo.";
    else
        document.getElementById("alertaEstres").innerHTML="";

    generarFrasePersonalizada(historial);
}

function generarFrasePersonalizada(historial){
    let pos=0,neg=0;
    historial.forEach(r=>{
        if(r.emocion.includes("Feliz")||r.emocion.includes("Agradecido")||r.emocion.includes("Fuerte"))pos++;
        if(r.emocion.includes("Ansioso")||r.emocion.includes("Triste")||r.emocion.includes("Enojado"))neg++;
    });

    if(neg>pos)
        document.getElementById("mensajeInteligente").innerHTML+="<br><br>💡 Patrón de carga emocional detectado. Intenta integrar 5 minutos extra de respiración diaria.";
    else if(pos>neg)
        document.getElementById("mensajeInteligente").innerHTML+="<br><br>🌟 Patrón positivo sólido. Continúa fortaleciendo tus hábitos actuales.";
    else
        document.getElementById("mensajeInteligente").innerHTML+="<br><br>⚖️ Patrón equilibrado. Mantén constancia.";
}

mostrarHistorial();
mostrarResumenEmocional();
actualizarAnalisis();
</script>

</body>
</html>
