<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pausa de Calma</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3c72">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

.container{
    background:rgba(0,0,0,0.3);
    padding:30px;
    border-radius:25px;
    backdrop-filter: blur(15px);
    width:90%;
    max-width:550px;
}

.circle{
    width:150px;
    height:150px;
    border-radius:50%;
    background:rgba(255,255,255,0.4);
    margin:20px auto;
    transition:transform 4s ease-in-out;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:white;
    color:#1e3c72;
    font-size:16px;
    margin:5px;
    cursor:pointer;
}

select, textarea{
    padding:8px;
    border-radius:10px;
    border:none;
    margin-top:10px;
    width:90%;
}

textarea{
    resize:none;
    height:60px;
}

.frase{
    margin-top:15px;
    font-style:italic;
    min-height:40px;
}

.historial{
    margin-top:15px;
    font-size:14px;
    max-height:120px;
    overflow:auto;
    text-align:left;
}

canvas{
    margin-top:20px;
    background:white;
    border-radius:15px;
}
</style>
</head>
<body>

<div class="container">

<h2>Respira</h2>
<div class="circle" id="circle"></div>
<p id="instruccion">Presiona iniciar</p>

<button onclick="iniciar()">Iniciar</button>
<button onclick="detener()">Detener</button>

<br>
<label>Duración:</label>
<select id="duracion">
<option value="300000">5 minutos</option>
<option value="600000">10 minutos</option>
<option value="900000">15 minutos</option>
</select>

<div class="frase" id="frase"></div>

<h3>Registro emocional diario</h3>

<select id="emocion">
<option value="😊 Feliz">😊 Feliz</option>
<option value="😌 Tranquilo">😌 Tranquilo</option>
<option value="😔 Triste">😔 Triste</option>
<option value="😟 Ansioso">😟 Ansioso</option>
<option value="😤 Enojado">😤 Enojado</option>
<option value="😴 Cansado">😴 Cansado</option>
<option value="🙏 Agradecido">🙏 Agradecido</option>
<option value="💪 Fuerte">💪 Fuerte</option>
</select>

<textarea id="nota" placeholder="Nota opcional..."></textarea>

<button onclick="guardarEmocion()">Guardar emoción</button>
<button onclick="borrarHistorial()">Borrar historial</button>

<div class="historial" id="historial"></div>

<h3>Resumen emocional general</h3>
<div id="resumenEmocional"></div>

<h3>Correlación Luna vs Emociones</h3>
<div id="correlacionLunar"></div>

<h3>Fase lunar actual</h3>
<div id="faseLunar"></div>

<canvas id="graficoEmociones"></canvas>
<canvas id="graficoLunar"></canvas>

</div>

<script>
let graficoGeneral;
let graficoLunar;

/* ===== FASE LUNAR ===== */

function calcularFaseLunar(fecha = new Date()) {
    const lp = 2551443;
    const now = fecha.getTime() / 1000;
    const new_moon = new Date('2001-01-24T13:00:00Z').getTime() / 1000;
    const phase = ((now - new_moon) % lp) / lp;

    if (phase < 0.03 || phase > 0.97) return "🌑 Luna Nueva";
    if (phase < 0.22) return "🌒 Luna Creciente";
    if (phase < 0.28) return "🌓 Cuarto Creciente";
    if (phase < 0.47) return "🌔 Gibosa Creciente";
    if (phase < 0.53) return "🌕 Luna Llena";
    if (phase < 0.72) return "🌖 Gibosa Menguante";
    if (phase < 0.78) return "🌗 Cuarto Menguante";
    return "🌘 Luna Menguante";
}

function mostrarFaseLunar(){
    const fase = calcularFaseLunar();
    document.getElementById("faseLunar").innerHTML = `<strong>${fase}</strong>`;
}

/* ===== REGISTRO ===== */

function guardarEmocion(){
    let emocion=document.getElementById("emocion").value;
    let nota=document.getElementById("nota").value;
    let fecha=new Date().toLocaleDateString();
    let hora=new Date().toLocaleTimeString();
    let fase=calcularFaseLunar();

    let registro={fecha,hora,emocion,nota,fase};

    let historial=JSON.parse(localStorage.getItem("registroEmocional"))||[];
    historial.push(registro);
    localStorage.setItem("registroEmocional",JSON.stringify(historial));

    document.getElementById("nota").value="";
    mostrarHistorial();
    actualizarAnalisis();
}

function borrarHistorial(){
    localStorage.removeItem("registroEmocional");
    mostrarHistorial();
    actualizarAnalisis();
}

function mostrarHistorial(){
    let historial=JSON.parse(localStorage.getItem("registroEmocional"))||[];
    let cont=document.getElementById("historial");
    cont.innerHTML="";
    historial.slice().reverse().forEach(r=>{
        cont.innerHTML+=`<div><strong>${r.fecha} ${r.hora}</strong><br>${r.emocion}<br><small>${r.fase}</small><hr></div>`;
    });
}

/* ===== ANALÍTICA ===== */

function actualizarAnalisis(){
    let historial=JSON.parse(localStorage.getItem("registroEmocional"))||[];
    if(historial.length===0){
        document.getElementById("resumenEmocional").innerHTML="Sin datos.";
        document.getElementById("correlacionLunar").innerHTML="";
        if(graficoGeneral)graficoGeneral.destroy();
        if(graficoLunar)graficoLunar.destroy();
        return;
    }

    let resumen={}, fases={};

    historial.forEach(r=>{
        resumen[r.emocion]=(resumen[r.emocion]||0)+1;
        if(!fases[r.fase])fases[r.fase]=[];
        fases[r.fase].push(r.emocion);
    });

    mostrarResumen(resumen);
    generarGraficoGeneral(resumen);
    analizarCorrelacion(fases);
    generarGraficoLunar(fases);
}

function mostrarResumen(resumen){
    let cont=document.getElementById("resumenEmocional");
    cont.innerHTML="";
    for(let e in resumen){
        cont.innerHTML+=`${e}: <strong>${resumen[e]}</strong><br>`;
    }
}

function generarGraficoGeneral(resumen){
    let ctx=document.getElementById("graficoEmociones").getContext("2d");
    if(graficoGeneral)graficoGeneral.destroy();
    graficoGeneral=new Chart(ctx,{
        type:"doughnut",
        data:{labels:Object.keys(resumen),
        datasets:[{data:Object.values(resumen)}]}
    });
}

function analizarCorrelacion(fases){
    let cont=document.getElementById("correlacionLunar");
    cont.innerHTML="";

    for(let fase in fases){
        let lista=fases[fase];
        let negativas=lista.filter(e=>e.includes("Ansioso")||e.includes("Triste")||e.includes("Enojado")).length;
        let porcentaje=Math.round((negativas/lista.length)*100);

        cont.innerHTML+=`<strong>${fase}</strong>: ${porcentaje}% emociones desafiantes<br>`;
    }
}

function generarGraficoLunar(fases){
    let etiquetas=[];
    let datos=[];

    for(let fase in fases){
        let negativas=fases[fase].filter(e=>
            e.includes("Ansioso")||
            e.includes("Triste")||
            e.includes("Enojado")
        ).length;

        etiquetas.push(fase);
        datos.push(negativas);
    }

    let ctx=document.getElementById("graficoLunar").getContext("2d");
    if(graficoLunar)graficoLunar.destroy();
    graficoLunar=new Chart(ctx,{
        type:"bar",
        data:{
            labels:etiquetas,
            datasets:[{
                label:"Emociones desafiantes por fase lunar",
                data:datos
            }]
        }
    });
}

/* ===== INIT ===== */

mostrarHistorial();
actualizarAnalisis();
mostrarFaseLunar();

</script>

</body>
</html>
