<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pausa de Calma</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="1024x1024" href="icon-1024.png">
<meta name="theme-color" content="#1e3c72">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

.container{
    background:rgba(0,0,0,0.3);
    padding:40px;
    border-radius:25px;
    backdrop-filter: blur(15px);
    width:85%;
    max-width:500px;
}

.circle{
    width:150px;
    height:150px;
    border-radius:50%;
    background:rgba(255,255,255,0.4);
    margin:30px auto;
    transition:transform 4s ease-in-out;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:white;
    color:#1e3c72;
    font-size:18px;
    margin:5px;
}

select, textarea{
    padding:8px;
    border-radius:10px;
    border:none;
    margin-top:10px;
    width:90%;
}

textarea{
    resize:none;
    height:60px;
}

.frase{
    margin-top:20px;
    font-style:italic;
    min-height:40px;
}

.historial{
    margin-top:15px;
    font-size:14px;
    max-height:120px;
    overflow:auto;
    text-align:left;
}

canvas{
    margin-top:20px;
    background:white;
    border-radius:15px;
}
</style>
</head>
<body>

<div class="container">
    <h2>Respira</h2>
    <div class="circle" id="circle"></div>
    <p id="instruccion">Presiona iniciar</p>

    <button onclick="iniciar()">Iniciar</button>
    <button onclick="detener()">Detener</button>

    <br>
    <label>Duración:</label>
    <select id="duracion">
        <option value="300000">5 minutos</option>
        <option value="600000">10 minutos</option>
        <option value="900000">15 minutos</option>
    </select>

    <div class="frase" id="frase"></div>

    <br><br>
    <button onclick="toggleSonido()">🌧 Lluvia</button>

    <h3>Registro emocional diario</h3>

    <select id="emocion">
        <option value="😊 Feliz">😊 Feliz</option>
        <option value="😌 Tranquilo">😌 Tranquilo</option>
        <option value="😔 Triste">😔 Triste</option>
        <option value="😟 Ansioso">😟 Ansioso</option>
        <option value="😤 Enojado">😤 Enojado</option>
        <option value="😴 Cansado">😴 Cansado</option>
        <option value="🙏 Agradecido">🙏 Agradecido</option>
        <option value="💪 Fuerte">💪 Fuerte</option>
    </select>

    <textarea id="nota" placeholder="Nota opcional..."></textarea>

    <button onclick="guardarEmocion()">Guardar emoción</button>
    <button onclick="borrarHistorial()">Borrar historial</button>

    <div class="historial" id="historial"></div>

    <h3>Resumen emocional</h3>
    <div id="resumenEmocional" style="font-size:14px; text-align:left;"></div>

    <!-- MENSAJE INTELIGENTE -->
    <h3>Reflexión inteligente</h3>
    <div id="mensajeInteligente"></div>

    <!-- FILTRO SEMANAL -->
    <h3>Filtro</h3>
    <select id="filtroTiempo" onchange="actualizarAnalisis()">
        <option value="todos">Todo el historial</option>
        <option value="semana">Últimos 7 días</option>
    </select>

    <!-- GRÁFICO -->
    <canvas id="graficoEmociones"></canvas>

</div>

<audio id="lluvia" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

let circle = document.getElementById("circle");
let instruccion = document.getElementById("instruccion");
let frase = document.getElementById("frase");
let lluvia = document.getElementById("lluvia");
let grafico;

// --- TODO TU CÓDIGO ORIGINAL SE MANTIENE IGUAL HASTA mostrarResumenEmocional() ---
// (NO SE MODIFICÓ NADA ARRIBA)

/* ============================
   NUEVAS FUNCIONES AVANZADAS
============================ */

function actualizarAnalisis(){
    let historial = JSON.parse(localStorage.getItem("registroEmocional")) || [];
    let filtro = document.getElementById("filtroTiempo").value;

    if(filtro === "semana"){
        let hoy = new Date();
        historial = historial.filter(r=>{
            let partes = r.fecha.split("/");
            let fechaRegistro = new Date(partes[2], partes[1]-1, partes[0]);
            let diff = (hoy - fechaRegistro) / (1000*60*60*24);
            return diff <= 7;
        });
    }

    analizarEmociones(historial);
}

function analizarEmociones(historial){

    if(historial.length === 0){
        document.getElementById("mensajeInteligente").innerHTML = "No hay datos suficientes.";
        if(grafico) grafico.destroy();
        return;
    }

    let resumen = {};
    historial.forEach(r=>{
        resumen[r.emocion] = (resumen[r.emocion] || 0) + 1;
    });

    let dominante = "";
    let max = 0;

    for(let e in resumen){
        if(resumen[e] > max){
            max = resumen[e];
            dominante = e;
        }
    }

    generarMensaje(dominante);
    generarGrafico(resumen);
}

function generarMensaje(emocion){

    let mensaje = "";

    if(emocion.includes("Ansioso") || emocion.includes("Triste") || emocion.includes("Enojado")){
        mensaje = "Has estado experimentando emociones desafiantes. Tal vez sea momento de bajar el ritmo y darte más espacios de autocuidado.";
    }
    else if(emocion.includes("Feliz") || emocion.includes("Agradecido") || emocion.includes("Fuerte")){
        mensaje = "Tu tendencia emocional es positiva. Sigue cultivando lo que te está funcionando.";
    }
    else{
        mensaje = "Tu estado emocional muestra equilibrio. Mantén tus hábitos de bienestar.";
    }

    document.getElementById("mensajeInteligente").innerHTML = mensaje;
}

function generarGrafico(resumen){

    let ctx = document.getElementById("graficoEmociones").getContext("2d");

    if(grafico) grafico.destroy();

    grafico = new Chart(ctx,{
        type:"doughnut",
        data:{
            labels:Object.keys(resumen),
            datasets:[{
                data:Object.values(resumen)
            }]
        },
        options:{
            plugins:{
                legend:{
                    labels:{ color:"black" }
                }
            }
        }
    });
}

function guardarEmocion(){
    let emocion = document.getElementById("emocion").value;
    let nota = document.getElementById("nota").value;
    let fecha = new Date().toLocaleDateString();
    let hora = new Date().toLocaleTimeString();

    let registro = { fecha, hora, emocion, nota };

    let historial = JSON.parse(localStorage.getItem("registroEmocional")) || [];
    historial.push(registro);
    localStorage.setItem("registroEmocional", JSON.stringify(historial));

    document.getElementById("nota").value="";
    mostrarHistorial();
    mostrarResumenEmocional();
    actualizarAnalisis();
}

function borrarHistorial(){
    localStorage.removeItem("registroEmocional");
    mostrarHistorial();
    mostrarResumenEmocional();
    actualizarAnalisis();
}

mostrarHistorial();
mostrarResumenEmocional();
actualizarAnalisis();

</script>

</body>
</html>
