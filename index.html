<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

let circle = document.getElementById("circle");
let instruccion = document.getElementById("instruccion");
let frase = document.getElementById("frase");
let lluvia = document.getElementById("lluvia");
let grafico;

/* ================= RESPIRACIÓN ================= */

let timeoutInhala;
let timeoutSosten;
let timeoutExhala;
let timeoutLoop;
let temporizadorSesion;

let frases = [
"Estás en un nuevo comienzo.","Respira… aquí estás seguro.","Un día a la vez.",
"No tienes que resolver todo hoy.","La calma también es fuerza.",
"Confía en tu proceso","Respira y avanza","Todo estará bien",
"Suelta lo que pesa","Hoy es un buen día","Un paso a la vez",
"Permítete descansar","Encuentra tu calma","Todo tiene su momento",
"Eres más fuerte de lo que crees","Abraza el presente",
"La paz está en ti","Haz espacio para lo nuevo"
];

function iniciar(){

    detener(); // evita múltiples ciclos

    ciclo();

    let tiempo = parseInt(document.getElementById("duracion").value);

    temporizadorSesion = setTimeout(()=>{
        detener();
        alert("Sesión completada 🌿");
    }, tiempo);
}

function detener(){

    clearTimeout(timeoutInhala);
    clearTimeout(timeoutSosten);
    clearTimeout(timeoutExhala);
    clearTimeout(timeoutLoop);
    clearTimeout(temporizadorSesion);

    instruccion.innerText="Pausa finalizada";
    circle.style.transform="scale(1)";
}

function ciclo(){

    instruccion.innerText="Inhala";
    circle.style.transform="scale(1.5)";

    timeoutSosten = setTimeout(()=>{
        instruccion.innerText="Sostén";
    },4000);

    timeoutExhala = setTimeout(()=>{
        instruccion.innerText="Exhala";
        circle.style.transform="scale(1)";
    },8000);

    timeoutLoop = setTimeout(()=>{
        frase.innerText=frases[Math.floor(Math.random()*frases.length)];
        ciclo();
    },14000);
}

function toggleSonido(){
    lluvia.paused ? lluvia.play() : lluvia.pause();
}

/* ================= REGISTRO ================= */

function guardarEmocion(){

    let emocion=document.getElementById("emocion").value;
    let nota=document.getElementById("nota").value;
    let fecha=new Date().toLocaleDateString();
    let hora=new Date().toLocaleTimeString();

    let registro={fecha,hora,emocion,nota};

    let historial=JSON.parse(localStorage.getItem("registroEmocional"))||[];
    historial.push(registro);

    localStorage.setItem("registroEmocional",JSON.stringify(historial));

    document.getElementById("nota").value="";

    mostrarHistorial();
    mostrarResumenEmocional();
    actualizarAnalisis();
}

function borrarHistorial(){
    localStorage.removeItem("registroEmocional");
    mostrarHistorial();
    mostrarResumenEmocional();
    actualizarAnalisis();
}

function mostrarHistorial(){

    let historial=JSON.parse(localStorage.getItem("registroEmocional"))||[];
    let contenedor=document.getElementById("historial");

    contenedor.innerHTML="";

    historial.slice().reverse().forEach(r=>{
        contenedor.innerHTML+=
        `<div>
            <strong>${r.fecha} ${r.hora}</strong><br>
            ${r.emocion}<br>
            <small>${r.nota}</small>
            <hr>
        </div>`;
    });
}

function mostrarResumenEmocional(){

    let historial=JSON.parse(localStorage.getItem("registroEmocional"))||[];
    let resumen={};
    let contenedor=document.getElementById("resumenEmocional");

    contenedor.innerHTML="";

    historial.forEach(r=>{
        resumen[r.emocion]=(resumen[r.emocion]||0)+1;
    });

    for(let e in resumen){
        contenedor.innerHTML+=`${e}: <strong>${resumen[e]}</strong><br>`;
    }
}

/* ================= ANALÍTICA ================= */

function actualizarAnalisis(){

    let historial=JSON.parse(localStorage.getItem("registroEmocional"))||[];
    analizarEmociones(historial);
}

function analizarEmociones(historial){

    let mensajeDiv=document.getElementById("mensajeInteligente");
    mensajeDiv.innerHTML=""; // 🔥 limpia antes

    if(historial.length===0){
        mensajeDiv.innerHTML="No hay datos.";
        document.getElementById("alertaEstres").innerHTML="";
        return;
    }

    let resumen={};

    historial.forEach(r=>{
        resumen[r.emocion]=(resumen[r.emocion]||0)+1;
    });

    let dominante=Object.keys(resumen)
        .reduce((a,b)=>resumen[a]>resumen[b]?a:b);

    generarMensaje(dominante);
    generarGrafico(resumen);
    analizarPatronEmocional(historial);
}

function generarMensaje(e){

    let mensajeDiv=document.getElementById("mensajeInteligente");

    if(e.includes("Ansioso")||e.includes("Triste")||e.includes("Enojado"))
        mensajeDiv.innerHTML="Has estado experimentando emociones desafiantes. Considera más pausas conscientes.";
    else if(e.includes("Feliz")||e.includes("Agradecido")||e.includes("Fuerte"))
        mensajeDiv.innerHTML="Tu tendencia emocional es positiva. Sigue cultivando estos hábitos.";
    else
        mensajeDiv.innerHTML="Tu estado emocional muestra equilibrio.";
}

function generarGrafico(resumen){

    let ctx=document.getElementById("graficoEmociones").getContext("2d");

    if(grafico) grafico.destroy();

    grafico=new Chart(ctx,{
        type:"doughnut",
        data:{
            labels:Object.keys(resumen),
            datasets:[{
                data:Object.values(resumen)
            }]
        }
    });
}

/* ===== ALERTA Y PATRÓN ===== */

function analizarPatronEmocional(historial){

    let ultimos=historial.slice(-7);

    let negativas=ultimos.filter(r=>
        r.emocion.includes("Ansioso")||
        r.emocion.includes("Triste")||
        r.emocion.includes("Enojado")
    ).length;

    let alerta=document.getElementById("alertaEstres");

    if(negativas>=4)
        alerta.innerHTML="🚨 Estrés recurrente detectado. Considera apoyo o descanso profundo.";
    else
        alerta.innerHTML="";

    generarFrasePersonalizada(historial);
}

function generarFrasePersonalizada(historial){

    let pos=0,neg=0;

    historial.forEach(r=>{
        if(r.emocion.includes("Feliz")||r.emocion.includes("Agradecido")||r.emocion.includes("Fuerte"))pos++;
        if(r.emocion.includes("Ansioso")||r.emocion.includes("Triste")||r.emocion.includes("Enojado"))neg++;
    });

    let mensajeDiv=document.getElementById("mensajeInteligente");

    if(neg>pos)
        mensajeDiv.innerHTML+="<br><br>💡 Patrón de carga emocional detectado. Intenta integrar 5 minutos extra de respiración diaria.";
    else if(pos>neg)
        mensajeDiv.innerHTML+="<br><br>🌟 Patrón positivo sólido. Continúa fortaleciendo tus hábitos actuales.";
    else
        mensajeDiv.innerHTML+="<br><br>⚖️ Patrón equilibrado. Mantén constancia.";
}

/* ===== INICIO ===== */

mostrarHistorial();
mostrarResumenEmocional();
actualizarAnalisis();
</script>
